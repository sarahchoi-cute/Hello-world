<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍💗 코브라 게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gaegu:wght@700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(160deg, #ffd6ec, #ffeef7 40%, #ffd0e8);
    font-family: 'Jua', 'Malgun Gothic', sans-serif;
    color: #d6337e;
    user-select: none;
    padding: 16px 0;
  }
  h1 {
    margin: 6px 0 2px;
    font-size: 30px;
    letter-spacing: 1px;
    color: #ff6fb0;
    text-shadow: 2px 2px 0 #fff, 0 0 14px rgba(255,111,176,0.5);
  }
  #info {
    display: flex;
    gap: 28px;
    margin-bottom: 12px;
    font-size: 17px;
    background: #fff;
    padding: 8px 20px;
    border-radius: 20px;
    box-shadow: 0 4px 12px rgba(255,105,180,0.25);
    border: 2px solid #ffc2e2;
  }
  #info span { color: #ff4fa3; font-weight: bold; }
  #gameCanvas {
    background: #fff6fb;
    border: 5px solid #ff9bce;
    border-radius: 18px;
    box-shadow: 0 8px 24px rgba(255,105,180,0.35);
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,182,213,0.55);
    backdrop-filter: blur(2px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay .card {
    background: #fff;
    padding: 30px 40px;
    border-radius: 24px;
    border: 3px solid #ffb3d9;
    box-shadow: 0 10px 30px rgba(255,105,180,0.4);
  }
  #overlay h2 { font-size: 32px; color: #ff5c9e; margin: 0 0 10px; }
  #overlay p { font-size: 18px; margin-bottom: 20px; color: #d6337e; }
  button {
    padding: 12px 30px;
    font-size: 16px;
    border: none;
    border-radius: 16px;
    background: linear-gradient(135deg, #ff9dc9, #ff6fb0);
    color: #fff;
    font-family: 'Jua', sans-serif;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(255,105,180,0.4);
    transition: transform 0.1s, box-shadow 0.2s;
  }
  button:hover { transform: scale(1.06); box-shadow: 0 6px 14px rgba(255,105,180,0.5); }
  button:active { transform: scale(0.97); }
  #controls {
    margin-top: 14px;
    font-size: 14px;
    color: #ff90bf;
    text-align: center;
    line-height: 1.6;
  }
  #touchPad {
    display: none;
    margin-top: 14px;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 8px;
  }
  #touchPad button {
    width: 56px; height: 56px;
    font-size: 20px;
    background: #fff;
    color: #ff6fb0;
    border: 2px solid #ffb3d9;
    border-radius: 14px;
    box-shadow: 0 3px 8px rgba(255,105,180,0.25);
  }
  #touchPad button:active { background: #ffb3d9; color: #fff; }
  @media (max-width: 520px) {
    #touchPad { display: grid; }
  }
</style>
</head>
<body>
  <h1>🐍💗 코브라 게임</h1>
  <div id="info">
    <div>점수 🍓 <span id="score">0</span></div>
    <div>최고 점수 👑 <span id="highScore">0</span></div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div id="controls">
    방향키 또는 WASD로 이동 · 스페이스바로 일시정지
  </div>

  <div id="touchPad">
    <div></div>
    <button data-dir="up">▲</button>
    <div></div>
    <button data-dir="left">◀</button>
    <div></div>
    <button data-dir="right">▶</button>
    <div></div>
    <button data-dir="down">▼</button>
    <div></div>
  </div>

  <div id="overlay">
    <div class="card">
      <h2 id="overlayTitle">아이쿠! 게임 오버 🎀</h2>
      <p id="overlayMsg">최종 점수: 0</p>
      <button id="restartBtn">다시 시작 💕</button>
    </div>
  </div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const restartBtn = document.getElementById('restartBtn');

  const GRID = 20;
  const TILE = canvas.width / GRID;

  let snake, dir, nextDir, food, score, highScore, gameLoop, speed, paused, running;

  highScore = parseInt(localStorage.getItem('snakeHighScorePink') || '0', 10);
  let memHighScore = highScore;
  highScoreEl.textContent = highScore;

  function resetGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 130;
    paused = false;
    running = true;
    scoreEl.textContent = score;
    placeFood();
    overlay.classList.remove('show');
    if (gameLoop) clearTimeout(gameLoop);
    tick();
  }

  function placeFood() {
    let valid = false;
    while (!valid) {
      food = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
      valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function tick() {
    if (!running) return;
    if (!paused) {
      update();
      draw();
    }
    gameLoop = setTimeout(tick, speed);
  }

  function update() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
      return endGame();
    }
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      if (speed > 60) speed -= 3;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  function drawHeart(cx, cy, size) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.beginPath();
    const s = size;
    ctx.moveTo(0, s * 0.3);
    ctx.bezierCurveTo(0, -s * 0.3, -s, -s * 0.3, -s, s * 0.1);
    ctx.bezierCurveTo(-s, s * 0.5, -s * 0.4, s * 0.8, 0, s * 1.1);
    ctx.bezierCurveTo(s * 0.4, s * 0.8, s, s * 0.5, s, s * 0.1);
    ctx.bezierCurveTo(s, -s * 0.3, 0, -s * 0.3, 0, s * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.fillStyle = '#fff6fb';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 은은한 격자
    ctx.strokeStyle = 'rgba(255,150,200,0.08)';
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * TILE, 0);
      ctx.lineTo(i * TILE, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * TILE);
      ctx.lineTo(canvas.width, i * TILE);
      ctx.stroke();
    }

    // 하트 먹이
    ctx.fillStyle = '#ff4fa3';
    ctx.shadowColor = '#ff9dc9';
    ctx.shadowBlur = 12;
    drawHeart(
      food.x * TILE + TILE / 2,
      food.y * TILE + TILE / 2 - TILE * 0.15,
      TILE * 0.32
    );
    ctx.shadowBlur = 0;

    // 뱀 (동글동글 파스텔 핑크)
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      const pad = 1.5;
      const grad = isHead ? '#ff6fb0' : (i % 2 === 0 ? '#ffb3d9' : '#ffc9e4');
      ctx.fillStyle = grad;
      ctx.shadowColor = isHead ? '#ff9dc9' : 'transparent';
      ctx.shadowBlur = isHead ? 10 : 0;
      roundRect(
        seg.x * TILE + pad,
        seg.y * TILE + pad,
        TILE - pad * 2,
        TILE - pad * 2,
        isHead ? 8 : 6
      );
      ctx.fill();
      ctx.shadowBlur = 0;

      if (isHead) {
        // 볼터치
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        const cx = seg.x * TILE + TILE / 2;
        const cy = seg.y * TILE + TILE / 2;

        // 눈
        ctx.fillStyle = '#5a2a3f';
        const eyeSize = TILE * 0.11;
        let ex1, ey1, ex2, ey2;
        const off = TILE * 0.2;
        if (dir.x === 1) { ex1 = cx + off; ey1 = cy - off; ex2 = cx + off; ey2 = cy + off; }
        else if (dir.x === -1) { ex1 = cx - off; ey1 = cy - off; ex2 = cx - off; ey2 = cy + off; }
        else if (dir.y === -1) { ex1 = cx - off; ey1 = cy - off; ex2 = cx + off; ey2 = cy - off; }
        else { ex1 = cx - off; ey1 = cy + off; ex2 = cx + off; ey2 = cy + off; }
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();

        // 반짝이는 눈빛
        ctx.fillStyle = '#fff';
        const shine = eyeSize * 0.35;
        ctx.beginPath(); ctx.arc(ex1 + shine * 0.5, ey1 - shine * 0.5, shine, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2 + shine * 0.5, ey2 - shine * 0.5, shine, 0, Math.PI * 2); ctx.fill();

        // 볼터치
        ctx.fillStyle = 'rgba(255,150,190,0.55)';
        const cheekOff = TILE * 0.32;
        let cx1, cy1, cx2, cy2;
        if (dir.x !== 0) {
          cx1 = cx - dir.x * cheekOff * 0.3; cy1 = cy - off * 1.4;
          cx2 = cx - dir.x * cheekOff * 0.3; cy2 = cy + off * 1.4;
        } else {
          cx1 = cx - off * 1.4; cy1 = cy - dir.y * cheekOff * 0.3;
          cx2 = cx + off * 1.4; cy2 = cy - dir.y * cheekOff * 0.3;
        }
        ctx.beginPath(); ctx.arc(cx1, cy1, TILE * 0.09, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2, cy2, TILE * 0.09, 0, Math.PI * 2); ctx.fill();
      }
    });
  }

  function endGame() {
    running = false;
    clearTimeout(gameLoop);
    if (score > memHighScore) {
      memHighScore = score;
      try { localStorage.setItem('snakeHighScorePink', memHighScore); } catch (e) {}
      highScoreEl.textContent = memHighScore;
    }
    overlayTitle.textContent = '아이쿠! 게임 오버 🎀';
    overlayMsg.textContent = `최종 점수: ${score}`;
    overlay.classList.add('show');
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      ctx.fillStyle = 'rgba(255,182,213,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 28px Jua, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('일시정지 💤', canvas.width / 2, canvas.height / 2);
    }
  }

  function setDirection(newDir) {
    if (newDir === 'up' && dir.y === 0) nextDir = { x: 0, y: -1 };
    else if (newDir === 'down' && dir.y === 0) nextDir = { x: 0, y: 1 };
    else if (newDir === 'left' && dir.x === 0) nextDir = { x: -1, y: 0 };
    else if (newDir === 'right' && dir.x === 0) nextDir = { x: 1, y: 0 };
  }

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDirection('up'); break;
      case 'ArrowDown': case 's': case 'S': setDirection('down'); break;
      case 'ArrowLeft': case 'a': case 'A': setDirection('left'); break;
      case 'ArrowRight': case 'd': case 'D': setDirection('right'); break;
      case ' ': e.preventDefault(); togglePause(); break;
    }
  });

  document.querySelectorAll('#touchPad button').forEach(btn => {
    btn.addEventListener('click', () => setDirection(btn.dataset.dir));
  });

  restartBtn.addEventListener('click', resetGame);

  resetGame();
</script>
</body>
</html>
