<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 코브라 게임</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #1e3c1e, #0d1f0d);
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    color: #eaffea;
    user-select: none;
  }
  h1 {
    margin: 10px 0;
    font-size: 28px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px #3cff3c;
  }
  #info {
    display: flex;
    gap: 30px;
    margin-bottom: 10px;
    font-size: 18px;
  }
  #info span { color: #7dff7d; font-weight: bold; }
  #gameCanvas {
    background: #0a140a;
    border: 4px solid #3cff3c;
    border-radius: 10px;
    box-shadow: 0 0 25px rgba(60,255,60,0.4);
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    z-index: 10;
  }
  #overlay.show { display: flex; }
  #overlay h2 { font-size: 36px; color: #ff5c5c; margin-bottom: 10px; text-shadow: 0 0 10px #ff5c5c; }
  #overlay p { font-size: 18px; margin-bottom: 20px; }
  button {
    padding: 12px 28px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #3cff3c;
    color: #0a140a;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.1s, background 0.2s;
  }
  button:hover { background: #6dff6d; transform: scale(1.05); }
  #controls {
    margin-top: 14px;
    font-size: 14px;
    color: #9fcf9f;
    text-align: center;
    line-height: 1.6;
  }
  #touchPad {
    display: none;
    margin-top: 14px;
    grid-template-columns: repeat(3, 56px);
    grid-template-rows: repeat(3, 56px);
    gap: 6px;
  }
  #touchPad button {
    width: 56px; height: 56px;
    font-size: 20px;
    background: #234023;
    color: #7dff7d;
    border: 2px solid #3cff3c;
  }
  #touchPad button:active { background: #3cff3c; color: #0a140a; }
  @media (max-width: 520px) {
    #touchPad { display: grid; }
  }
</style>
</head>
<body>
  <h1>🐍 코브라 게임</h1>
  <div id="info">
    <div>점수: <span id="score">0</span></div>
    <div>최고 점수: <span id="highScore">0</span></div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>

  <div id="controls">
    방향키 또는 WASD로 이동 · 스페이스바로 일시정지
  </div>

  <div id="touchPad">
    <div></div>
    <button data-dir="up">▲</button>
    <div></div>
    <button data-dir="left">◀</button>
    <div></div>
    <button data-dir="right">▶</button>
    <div></div>
    <button data-dir="down">▼</button>
    <div></div>
  </div>

  <div id="overlay">
    <h2 id="overlayTitle">게임 오버!</h2>
    <p id="overlayMsg">최종 점수: 0</p>
    <button id="restartBtn">다시 시작</button>
  </div>

<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayMsg = document.getElementById('overlayMsg');
  const restartBtn = document.getElementById('restartBtn');

  const GRID = 20;
  const TILE = canvas.width / GRID;

  let snake, dir, nextDir, food, score, highScore, gameLoop, speed, paused, running;

  highScore = parseInt(localStorage.getItem('snakeHighScore') || '0', 10);
  // Note: localStorage may not persist in this sandboxed artifact preview; using in-memory fallback too.
  let memHighScore = highScore;
  highScoreEl.textContent = highScore;

  function resetGame() {
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    speed = 130;
    paused = false;
    running = true;
    scoreEl.textContent = score;
    placeFood();
    overlay.classList.remove('show');
    if (gameLoop) clearTimeout(gameLoop);
    tick();
  }

  function placeFood() {
    let valid = false;
    while (!valid) {
      food = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
      valid = !snake.some(s => s.x === food.x && s.y === food.y);
    }
  }

  function tick() {
    if (!running) return;
    if (!paused) {
      update();
      draw();
    }
    gameLoop = setTimeout(tick, speed);
  }

  function update() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // 벽 충돌
    if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID) {
      return endGame();
    }
    // 자기 몸 충돌
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      return endGame();
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      if (speed > 60) speed -= 3;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function draw() {
    ctx.fillStyle = '#0a140a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 격자 느낌
    ctx.strokeStyle = 'rgba(60,255,60,0.05)';
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * TILE, 0);
      ctx.lineTo(i * TILE, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * TILE);
      ctx.lineTo(canvas.width, i * TILE);
      ctx.stroke();
    }

    // 먹이
    ctx.fillStyle = '#ff5c5c';
    ctx.shadowColor = '#ff5c5c';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(
      food.x * TILE + TILE / 2,
      food.y * TILE + TILE / 2,
      TILE / 2.4,
      0, Math.PI * 2
    );
    ctx.fill();
    ctx.shadowBlur = 0;

    // 뱀
    snake.forEach((seg, i) => {
      const isHead = i === 0;
      ctx.fillStyle = isHead ? '#7dff7d' : '#3cff3c';
      ctx.shadowColor = isHead ? '#7dff7d' : 'transparent';
      ctx.shadowBlur = isHead ? 8 : 0;
      const pad = 1.5;
      ctx.fillRect(
        seg.x * TILE + pad,
        seg.y * TILE + pad,
        TILE - pad * 2,
        TILE - pad * 2
      );
      ctx.shadowBlur = 0;

      if (isHead) {
        // 눈
        ctx.fillStyle = '#0a140a';
        const eyeSize = TILE * 0.12;
        let ex1, ey1, ex2, ey2;
        const cx = seg.x * TILE + TILE / 2;
        const cy = seg.y * TILE + TILE / 2;
        const off = TILE * 0.2;
        if (dir.x === 1) { ex1 = cx + off; ey1 = cy - off; ex2 = cx + off; ey2 = cy + off; }
        else if (dir.x === -1) { ex1 = cx - off; ey1 = cy - off; ex2 = cx - off; ey2 = cy + off; }
        else if (dir.y === -1) { ex1 = cx - off; ey1 = cy - off; ex2 = cx + off; ey2 = cy - off; }
        else { ex1 = cx - off; ey1 = cy + off; ex2 = cx + off; ey2 = cy + off; }
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeSize, 0, Math.PI * 2); ctx.fill();
      }
    });
  }

  function endGame() {
    running = false;
    clearTimeout(gameLoop);
    if (score > memHighScore) {
      memHighScore = score;
      try { localStorage.setItem('snakeHighScore', memHighScore); } catch (e) {}
      highScoreEl.textContent = memHighScore;
    }
    overlayTitle.textContent = '게임 오버! 💀';
    overlayMsg.textContent = `최종 점수: ${score}`;
    overlay.classList.add('show');
  }

  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#7dff7d';
      ctx.font = 'bold 28px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('일시정지', canvas.width / 2, canvas.height / 2);
    }
  }

  function setDirection(newDir) {
    if (newDir === 'up' && dir.y === 0) nextDir = { x: 0, y: -1 };
    else if (newDir === 'down' && dir.y === 0) nextDir = { x: 0, y: 1 };
    else if (newDir === 'left' && dir.x === 0) nextDir = { x: -1, y: 0 };
    else if (newDir === 'right' && dir.x === 0) nextDir = { x: 1, y: 0 };
  }

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': setDirection('up'); break;
      case 'ArrowDown': case 's': case 'S': setDirection('down'); break;
      case 'ArrowLeft': case 'a': case 'A': setDirection('left'); break;
      case 'ArrowRight': case 'd': case 'D': setDirection('right'); break;
      case ' ': e.preventDefault(); togglePause(); break;
    }
  });

  document.querySelectorAll('#touchPad button').forEach(btn => {
    btn.addEventListener('click', () => setDirection(btn.dataset.dir));
  });

  restartBtn.addEventListener('click', resetGame);

  resetGame();
</script>
</body>
</html>
